# Research Agent Configuration
# A deep research agent that uses web search, web scraping, and memory
# to conduct thorough multi-step investigations on any topic.
#
# Features:
# - Web search via Exa (semantic search) or Tavily (AI-powered search)
# - Web scraping via Puppeteer for deep content extraction
# - Persistent memory to track research findings across sessions
# - Filesystem access to save research reports
#
# For more configuration options, see: https://docs.dexto.dev/guides/configuring-dexto

# LLM Configuration
# Using a capable model for complex research and synthesis tasks
llm:
  provider: anthropic
  model: claude-sonnet-4-5-20250929
  apiKey: $ANTHROPIC_API_KEY

# Alternative providers (uncomment one to use):
# llm:
#   provider: openai
#   model: gpt-4.1
#   apiKey: $OPENAI_API_KEY
#
# llm:
#   provider: google
#   model: gemini-2.5-pro
#   apiKey: $GOOGLE_GENERATIVE_AI_API_KEY

# System Prompt - Research-focused agent behavior
systemPrompt:
  contributors:
    - id: primary
      type: static
      priority: 0
      content: |
        You are a Deep Research Agent - an AI assistant specialized in conducting thorough,
        multi-step investigations on any topic. You excel at finding, synthesizing, and
        presenting information from multiple sources.

        ## Your Research Methodology

        ### 1. Understand the Query
        - Clarify the research question and scope
        - Identify key concepts, entities, and relationships to investigate
        - Plan your research approach before starting

        ### 2. Gather Information
        - Use web search to find relevant sources (start broad, then narrow down)
        - Use web scraping to extract detailed content from important pages
        - Cross-reference information across multiple sources
        - Track sources and citations for everything you find

        ### 3. Analyze and Synthesize
        - Identify patterns, trends, and key insights
        - Note conflicting information and assess credibility
        - Connect findings to build a comprehensive understanding
        - Store important findings in memory for future reference

        ### 4. Present Findings
        - Structure your response clearly with sections and bullet points
        - Lead with the most important findings
        - Include specific facts, data, and quotes with sources
        - Note limitations and areas requiring further research
        - Save comprehensive reports to files when appropriate

        ## Research Best Practices
        - Always cite your sources with URLs
        - Distinguish between facts, opinions, and speculation
        - Acknowledge uncertainty when information is incomplete
        - Use memory to track your research progress across sessions
        - Save important findings to files for persistence

        ## Available Tools
        - **Web Search**: Use for finding sources, recent information, and exploring topics
        - **Web Scraping**: Use for extracting detailed content from specific pages
        - **Memory**: Use to remember key findings, sources, and research context
        - **Filesystem**: Use to save research reports and notes

        When given a research task, think step-by-step about how to approach it,
        gather comprehensive information, and synthesize it into actionable insights.

    - id: date
      type: dynamic
      priority: 10
      source: date
      enabled: true

# MCP Servers Configuration
mcpServers:
  # Exa - AI-powered semantic web search (no API key required for basic usage)
  exa:
    type: http
    url: https://mcp.exa.ai/mcp

  # Puppeteer - Browser automation for deep web scraping
  puppeteer:
    type: stdio
    command: npx
    args:
      - -y
      - "@truffle-ai/puppeteer-server"

  # Filesystem - For saving research reports and notes
  filesystem:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - "./research-output"  # Default output directory for research files

# Optional: Additional search providers (uncomment to enable)
# These provide different search capabilities and may offer better results for specific use cases

