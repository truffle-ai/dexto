#     env:
#       FIRECRAWL_API_KEY: $FIRECRAWL_API_KEY

# Storage Configuration
# Using SQLite for persistent storage of research sessions and memories
storage:
  cache:
    type: in-memory
  database:
    type: sqlite
    # Database file will be created in ~/.dexto/agents/research-agent/
  blob:
    type: local
    maxBlobSize: 52428800     # 50MB for storing research artifacts
    maxTotalSize: 1073741824  # 1GB total storage
    cleanupAfterDays: 90      # Keep research data for 90 days

# Memory Configuration
# Enable persistent memory to track research findings across sessions
memories:
  enabled: true
  priority: 40    # Memory context appears after system prompt
  limit: 20       # Remember up to 20 key findings/facts
  includeTags: true

# Permissions Configuration
permissions:
  mode: auto-approve
  allowedToolsStorage: memory

# Optional greeting message
greeting: |
  I'm your Deep Research Agent. I can help you investigate any topic thoroughly
  by searching the web, scraping detailed content, and synthesizing findings.

  What would you like me to research?
